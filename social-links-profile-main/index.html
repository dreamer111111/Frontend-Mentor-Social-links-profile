<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="styles.css" />

    <title>Frontend Mentor | Social links profile</title>
  </head>
  <body>
    <main class="card">
      <header class="hero">
        <img
          src="./assets/images/avatar-jessica.jpeg"
          class="hero-img"
          alt="Jessica Randall"
          width="88"
          height="88"
        />
        <h1 class="hero-title">Jessica Randall</h1>
        <p class="hero-subtitle">London, United Kingdom</p>
        <blockquote>
          <p class="hero-description">"Front-end developer and avid reader."</p>
        </blockquote>
      </header>
      <nav class="social-nav" aria-label="Social media profile links">
        <ul class="social-list">
          <li>
            <a
              href="https://github.com"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="GitHub (opens in a new tab)"
              >GitHub</a
            >
          </li>
          <li>
            <a
              href="https://www.frontendmentor.io"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Frontend Mentor (opens in a new tab)"
              >Frontend Mentor</a
            >
          </li>
          <li>
            <a
              href="https://www.linkedin.com"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="LinkedIn (opens in a new tab)"
              >LinkedIn</a
            >
          </li>
          <li>
            <a
              href="https://twitter.com"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Twitter (opens in a new tab)"
              >Twitter</a
            >
          </li>
          <li>
            <a
              href="https://www.instagram.com"
              class="social-link"
              target="_blank"
              rel="noopener noreferrer"
              aria-label="Instagram (opens in a new tab)"
              >Instagram</a
            >
          </li>
        </ul>
      </nav>
    </main>

    <!-- <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Rudro Roy</a>. -->
    <!-- </div> -->
  </body>
</html>
